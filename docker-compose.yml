version: '3.8'
services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=secret
      - DB_NAME=socialmedia
      - DB_PORT=5432
      - JWT_SECRET=supersecretkeyforqa
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=socialmedia
    volumes:
      - pg_data:/var/lib/postgresql/data

  k6:
    image: grafana/k6:latest
    volumes:
      - .:/apps
    working_dir: /apps
    command: run k6_stress_test.js
    depends_on:
      - api

  newman:
    image: postman/newman:latest
    volumes:
      - .:/etc/newman
    command: run SocialMediaAPI.postman_collection.json --env-var baseUrl=http://api:5000
    depends_on:
      - api

volumes:
  pg_data:
